version: "3.8"

services:
  backend:
    build: ./minichat
    ports:
      - "5000:5000" # Express exposed on 5000
    env_file:
      - ./minichat/.env
    volumes:
      - ./minichat:/app
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build: ./ui
    ports:
      - "3000:3000" # Next.js on 3000
    volumes:
      - ./ui:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
