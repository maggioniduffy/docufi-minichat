services:
  backend:
    build: ./minichat
    ports:
      - "5000:5000" # Express exposed on 5000
    env_file:
      - ./minichat/.env
    volumes:
      - ./minichat/uploads:/app/uploads
      - ./minichat:/app
      - /app/node_modules
      - ./db:/app/db
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - redis

  frontend:
    build: ./ui
    ports:
      - "3000:3000" # Next.js on 3000
    volumes:
      - ./ui:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    build: ./minichat
    command: node utils/worker.js
    volumes:
      - ./minichat/uploads:/app/uploads
      - ./db:/app/db
    depends_on:
      - redis
    environment:
      - NODE_ENV=development